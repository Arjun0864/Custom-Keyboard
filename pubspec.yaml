name: flutterboard
description: A production-ready custom Android keyboard built with Flutter
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0

  # Storage & Persistence
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # UI & Theming
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Gesture & Input
  flutter_keyboard_visibility: ^6.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Haptics & Vibration
  vibration: ^2.0.0

  # Audio / Sound Effects
  audioplayers: ^6.1.0

  # Clipboard
  super_clipboard: ^0.9.1

  # Animations
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.2.1
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
